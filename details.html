    }

      --blue: #60a5fa;
      --blue-dark: #3b82f6;
      --blue-deep: #93c5fd;
      --blue-light: #1e3a5f;

      --card-shadow-hover: 0 18px 50px rgba(0, 0, 0, 0.6);

    [data-theme="dark"] .darood-line span {

    }

    [data-theme="dark"] .search-section {

    [data-theme="dark"] .verified-head-title {

    [data-theme="dark"] .verified-expand-btn {

    [data-theme="dark"] .suggestions div {

    [data-theme="dark"] .suggestions div:hover {

    [data-theme="dark"] .cbox span a[href^="mailto:"],

    body {
      background: var(--bg);
      font-family: "Poppins", sans-serif;
      color: var(--text);
      overflow-x: hidden;
    }

    /* ==================== NAVBAR ==================== */
    .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      height: 68px;
      background: rgba(255, 255, 255, 0.93);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 28px;
      border-bottom: 1px solid var(--border);
      z-index: 1001;
      transition: box-shadow 0.3s;
    }

    .navbar.scrolled {
      box-shadow: 0 2px 20px rgba(0, 0, 0, 0.08);
    }

    .logo {
      font-family: "Playfair Display", serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--blue);
      letter-spacing: 2px;
      text-decoration: none;
    }

    nav {
      display: flex;
      align-items: center;
    }

    nav a {
      margin-left: 24px;
      text-decoration: none;
      color: var(--muted);
      font-weight: 500;
      font-size: 14px;
      position: relative;
      transition: color 0.2s;
    }

    nav a::after {
      content: "";
      position: absolute;
      bottom: -3px;
      left: 0;
      width: 0;
      height: 2px;
      background: var(--blue);
      border-radius: 2px;
      transition: width 0.3s;
    }

    nav a:hover {
      color: var(--blue);
    }

    nav a:hover::after {
      width: 100%;
    }

    .category {
      position: relative;
      margin-left: 24px;
      padding-bottom: 10px;
      margin-bottom: -10px;
    }

    .category-btn {
      color: var(--muted);
      font-weight: 500;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-family: "Poppins", sans-serif;
      transition: color 0.2s;
      padding: 0;
    }

    .category-btn:hover {
      color: var(--blue);
    }

    .dropdown {
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%) translateY(-8px);
      background: var(--white);
      border-radius: 13px;
      box-shadow: 0 10px 36px rgba(0, 0, 0, 0.12);
      display: flex;
      flex-direction: column;
      min-width: 165px;
      overflow: hidden;
      padding-top: 8px;
      max-height: 0;
      opacity: 0;
      pointer-events: none;
      transition:
        max-height 0.35s ease,
        opacity 0.28s ease,
        transform 0.28s ease;
      border: 1px solid var(--border);
    }

    .dropdown.show {
      max-height: 400px;
      opacity: 1;
      pointer-events: all;
      transform: translateX(-50%) translateY(0);
    }

    .dropdown a {
      padding: 11px 18px;
      border-bottom: 1px solid var(--border);
      text-decoration: none;
      color: var(--text);
      font-size: 13px;
      font-weight: 500;
      margin-left: 0 !important;
      transition:
        background 0.15s,
        color 0.15s;
    }

    .dropdown a::after {
      display: none !important;
    }

    .dropdown a:last-child {
      border-bottom: none;
    }

    .dropdown a:hover {
      background: var(--blue-light);
      color: var(--blue);
    }

    .menu-btn {
      display: none;
      font-size: 22px;
      cursor: pointer;
      color: var(--text);
      background: none;
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 10px;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .menu-btn:hover {
      background: var(--blue-light);
    }

    @media (min-width: 769px) {
      .category:hover .dropdown {
        max-height: 400px;
        opacity: 1;
        pointer-events: all;
        transform: translateX(-50%) translateY(0);
      }

      .category:hover .category-btn {
        color: var(--blue);
      }
    }

    @media (max-width: 768px) {
      .navbar {
        padding: 0 18px;
      }

      nav {
        position: absolute;
        top: 68px;
        left: 0;
        width: 100%;
        background: var(--white);
        flex-direction: column;
        display: flex;
        max-height: 0;
        overflow: hidden;
        opacity: 0;
        transition:
          max-height 0.4s ease,
          opacity 0.3s ease;
        border-bottom: 1px solid var(--border);
      }

      nav.active {
        max-height: 600px;
        opacity: 1;
      }

      nav a,
      .category-btn {
        padding: 14px 20px;
        border-top: 1px solid var(--border);
        width: 100%;
        text-align: left;
        margin-left: 0 !important;
        display: block;
      }

      nav a::after {
        display: none !important;
      }

      .category {
        width: 100%;
        margin-left: 0;
        padding-bottom: 0;
        margin-bottom: 0;
      }

      .dropdown {
        position: static;
        box-shadow: none;
        border: none;
        padding-top: 0;
        align-items: stretch;
        border-top: 1px solid var(--border);
        transform: none !important;
      }

      .dropdown a {
        padding-left: 36px;
        background: #f8fafc;
      }

      .menu-btn {
        display: flex;
      }
    }

    /* ==================== BACK BUTTON ==================== */
    .back-btn {
      position: fixed;
      top: 82px;
      left: 18px;
      width: 42px;
      height: 42px;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: var(--text);
      text-decoration: none;
      z-index: 1000;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.09);
      transition: all 0.25s cubic-bezier(0.34, 1.3, 0.64, 1);
    }

    .back-btn:hover {
      background: var(--blue);
      color: #fff;
      border-color: var(--blue);
      transform: translateX(-3px) scale(1.06);
      box-shadow: 0 6px 18px rgba(37, 99, 235, 0.3);
    }

    [data-theme="dark"] .back-btn {
      background: rgba(30, 41, 59, 0.92);
      color: var(--text);
      border-color: var(--border);
    }

    [data-theme="dark"] .back-btn:hover {
      background: var(--blue);
      color: #fff;
    }

    /* ==================== HERO ==================== */
    .hero {
      position: relative;
      width: 100%;
      height: 78vh;
      min-height: 440px;
      overflow: hidden;
      margin-top: 68px;
    }

    .hero-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 9s ease;
    }

    .hero:hover .hero-img {
      transform: scale(1.05);
    }

    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top,
          rgba(0, 0, 0, 0.82) 0%,
          rgba(0, 0, 0, 0.22) 48%,
          transparent 100%);
    }

    .hero-bottom {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 48px 44px 38px;
      z-index: 2;
    }

    .hero-bottom h1 {
      font-family: "Playfair Display", serif;
      font-size: 48px;
      color: #fff;
      line-height: 1.12;
      letter-spacing: 0.5px;
      text-shadow: 0 2px 18px rgba(0, 0, 0, 0.4);
      animation: slideUp 0.75s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(22px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 640px) {
      .hero {
        height: 56vh;
        min-height: 300px;
      }

      .hero-bottom {
        padding: 24px 20px 22px;
      }

      .hero-bottom h1 {
        font-size: 26px;
      }
    }

    /* ==================== BODY WRAP ==================== */
    .body-wrap {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 24px;
    }

    @media (max-width: 600px) {
      .body-wrap {
        padding: 0 14px;
      }
    }

    /* ==================== SECTION HEADER ==================== */
    .sec-head {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 22px;
      margin-top: 52px;
    }

    .sec-head h2 {
      font-family: "Playfair Display", serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
    }

    .sec-head::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    @media (max-width: 600px) {
      .sec-head {
        margin-top: 38px;
      }

      .sec-head h2 {
        font-size: 19px;
      }
    }

    /* ==================== GALLERY ==================== */
    .gallery-outer {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 24px;
    }

    @media (max-width: 600px) {
      .gallery-outer {
        padding: 0 14px;
      }
    }

    .gallery-scroll {
      display: flex;
      gap: 14px;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      scroll-behavior: smooth;
      padding-bottom: 10px;
    }

    .gallery-scroll::-webkit-scrollbar {
      height: 3px;
    }

    .gallery-scroll::-webkit-scrollbar-track {
      background: var(--border);
      border-radius: 2px;
    }

    .gallery-scroll::-webkit-scrollbar-thumb {
      background: var(--blue);
      border-radius: 2px;
    }

    .gcard {
      flex: 0 0 290px;
      scroll-snap-align: start;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.09);
      cursor: pointer;
      position: relative;
      transition:
        transform 0.32s cubic-bezier(0.34, 1.3, 0.64, 1),
        box-shadow 0.3s;
    }

    .gcard::after {
      content: "Click";
      position: absolute;
      inset: 0;
      background: rgba(37, 99, 235, 0);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      color: #fff;
      opacity: 0;
      transition: all 0.3s;
    }

    .gcard:hover {
      transform: translateY(-7px);
      box-shadow: 0 16px 40px rgba(37, 99, 235, 0.18);
    }

    .gcard:hover::after {
      background: rgba(20, 40, 120, 0.28);
      opacity: 1;
    }

    .gcard img {
      width: 100%;
      height: 210px;
      object-fit: cover;
      display: block;
    }

    @media (max-width: 560px) {
      .gcard {
        flex: 0 0 75vw;
      }

      .gcard img {
        height: 180px;
      }
    }

    /* ==================== ABOUT ==================== */
    .about-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 36px 40px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }

    .about-card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 4px;
      height: 100%;
      background: linear-gradient(to bottom, var(--blue), #93c5fd);
      border-radius: 4px 0 0 4px;
    }

    .about-card p {
      font-size: 15px;
      color: var(--text);
      line-height: 1.92;
      padding-left: 4px;
      margin-bottom: 14px;
    }

    .about-card p:last-child {
      margin-bottom: 0;
    }

    @media (max-width: 600px) {
      .about-card {
        padding: 22px 18px 22px 24px;
      }
    }

    /* ==================== OWNER ==================== */
    .owner-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 36px 40px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      display: flex;
      gap: 36px;
      align-items: center;
    }

    .owner-img-wrap {
      flex-shrink: 0;
      width: 300px;
      height: 300px;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.12);
      cursor: pointer;
      position: relative;
      transition:
        transform 0.32s cubic-bezier(0.34, 1.3, 0.64, 1),
        box-shadow 0.3s;
    }

    .owner-img-wrap::after {
      content: "Click";
      position: absolute;
      inset: 0;
      background: rgba(37, 99, 235, 0);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      color: #fff;
      opacity: 0;
      transition: all 0.3s;
    }

    .owner-img-wrap:hover {
      transform: scale(1.04);
      box-shadow: 0 12px 36px rgba(37, 99, 235, 0.2);
    }

    .owner-img-wrap:hover::after {
      background: rgba(20, 40, 120, 0.22);
      opacity: 1;
    }

    .owner-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .owner-info h3 {
      font-family: "Playfair Display", serif;
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 12px;
    }

    .owner-info p {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.85;
    }

    @media (max-width: 640px) {
      .owner-card {
        flex-direction: column;
        padding: 26px 18px;
        text-align: center;
        gap: 22px;
      }

      .owner-img-wrap {
        width: 260px;
        height: 260px;
      }
    }

    @media (max-width: 600px) {
      .owner-card {
        padding: 22px 18px;
      }
    }

    /* ==================== CONTACT ==================== */
    .contact-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 36px 40px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 28px;
    }

    .cbox {
      background: var(--blue-light);
      border: 1px solid rgba(37, 99, 235, 0.12);
      padding: 16px 18px;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      transition:
        transform 0.2s,
        box-shadow 0.2s;
    }

    .cbox:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(37, 99, 235, 0.1);
    }

    .cbox strong {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--blue);
      font-weight: 600;
    }

    .cbox span {
      font-size: 14px;
      color: var(--text);
      font-weight: 500;
    }

    .cbox.full {
      grid-column: 1/-1;
    }

    .cbox-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .cbox-icon {
      flex-shrink: 0;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      text-decoration: none;
      color: #fff;
      transition:
        transform 0.2s,
        box-shadow 0.2s;
    }

    .cbox-icon.call {
      background: var(--blue);
    }

    .cbox-icon.whatsapp {
      background: #25d366;
    }

    .cbox-icon:hover {
      transform: scale(1.1);
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.25);
    }

    /* contact link styles - original preserved exactly */
    .cbox span a {
      font-weight: 600;
      position: relative;
      text-decoration: none;
      transition: all 0.25s ease;
    }

    .cbox span a[href^="tel:"] {
      color: black;
      text-decoration: underline;
    }

    .cbox span a[href^="https://wa.me"] {
      color: black;
      text-decoration: underline;
    }

    .cbox span a::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -2px;
      width: 0%;
      height: 2px;
      transition: width 0.3s ease;
    }

    .cbox span a[href^="tel:"]::after {
      background: var(--blue);
    }

    .cbox span a[href^="https://wa.me"]::after {
      background: #25d366;
    }

    .cbox span a:hover::after {
      width: 100%;
    }

    .cbox span a:active {
      transform: scale(0.95);
    }

    .cbox span a::before {
      position: absolute;
      top: 50%;
      left: 100%;
      transform: translate(8px, -50%) scale(0.9);
      background: #111;
      color: #fff;
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 6px;
      opacity: 0;
      pointer-events: none;
      transition: all 0.25s ease;
      white-space: nowrap;
    }

    .cbox span a[href^="tel:"]::before {
      content: "Call Now";
    }

    .cbox span a[href^="https://wa.me"]::before {
      content: "Chat Now";
    }

    /* .cbox span a[href^="mailto:"]{ color:var(--text); text-decoration: underline; } */
    /* .cbox span a[href^="mailto:"]{ color:var(--blue); text-decoration:underline; } */
    .cbox span a[href^="mailto:"] {
      color: black;
      text-decoration: underline;
    }

    .cbox span a[href^="mailto:"]::after {
      background: var(--blue);
    }

    .cbox span a[href^="mailto:"]::before {
      content: "Send Email";
    }

    .cbox span a[href^="mailto:"]::after {
      background: var(--blue);
    }

    .cbox span a[href^="mailto:"]::before {
      content: "Send Email";
    }

    .cbox span a:hover::before {
      opacity: 1;
      transform: translate(10px, -50%) scale(1);
    }

    .cbox span a[href^="https://mail.google.com"] {
      color: black;
      text-decoration: underline;
    }

    .cbox span a[href^="https://mail.google.com"]::after {
      background: var(--blue);
    }

    .cbox span a[href^="https://mail.google.com"]::before {
      content: "Send Email";
    }

    .map {
      width: 100%;
      height: 300px;
      border-radius: 12px;
      border: none;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    }

    /* open/closed badge — original preserved exactly */
    .open-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #dcfce7;
      color: #166534;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 20px;
    }

    .open-badge::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.4;
      }
    }

    .open-badge.closed {
      background: #fee2e2;
      color: #991b1b;
    }

    .open-badge.closed::before {
      background: #ef4444;
    }

    .open-badge.warning {
      background: #fef9c3;
      color: #854d0e;
    }

    .open-badge.warning::before {
      background: #facc15;
    }

    @media (max-width: 600px) {
      .contact-grid {
        grid-template-columns: 1fr;
      }

      .contact-card {
        padding: 22px 18px;
      }
    }

    /* ==================== LIGHTBOX ==================== */
    #lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.93);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      backdrop-filter: blur(8px);
    }

    #lightbox.open {
      display: flex;
    }

    #lightboxImg {
      max-width: 92%;
      max-height: 88vh;
      border-radius: 14px;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.5);
      animation: zoomIn 0.32s cubic-bezier(0.34, 1.56, 0.64, 1);
      transition:
        opacity 0.2s ease,
        transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
    }

    @keyframes zoomIn {
      from {
        transform: scale(0.72);
        opacity: 0;
      }

      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    #lightbox.closing #lightboxImg {
      animation: zoomOut 0.25s ease forwards;
    }

    #lightbox.closing {
      animation: fadeOutBg 0.25s ease forwards;
    }

    @keyframes zoomOut {
      from {
        transform: scale(1);
        opacity: 1;
      }

      to {
        transform: scale(0.8);
        opacity: 0;
      }
    }

    @keyframes fadeOutBg {
      from {
        opacity: 1;
      }

      to {
        opacity: 0;
      }
    }

    #closeBtn {
      position: absolute;
      top: 22px;
      right: 26px;
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      color: #fff;
      cursor: pointer;
      transition:
        background 0.2s,
        transform 0.2s;
    }

    #closeBtn:hover {
      background: rgba(255, 255, 255, 0.22);
      transform: scale(1.1);
    }

    #prevBtn,
    #nextBtn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      color: #fff;
      cursor: pointer;
      transition:
        background 0.2s,
        transform 0.2s;
      user-select: none;
    }

    #prevBtn {
      left: 20px;
    }

    #nextBtn {
      right: 20px;
    }

    #prevBtn:hover,
    #nextBtn:hover {
      background: rgba(255, 255, 255, 0.22);
      transform: translateY(-50%) scale(1.1);
    }

    #lightbox.owner-mode #prevBtn,
    #lightbox.owner-mode #nextBtn {
      display: none;
    }

    /* ==================== SCROLL REVEAL ==================== */
    .reveal {
      opacity: 0;
      transform: translateY(22px);
      transition:
        opacity 0.55s ease,
        transform 0.55s ease;
    }

    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ==================== FOOTER ==================== */
    .footer {
      background: var(--white);
      border-top: 1px solid var(--border);
      padding: 32px 24px 24px;
      text-align: center;
      margin-top: 72px;
    }

    .f-logo {
      font-family: "Playfair Display", serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--blue);
      letter-spacing: 2px;
      margin-bottom: 12px;
    }

    .f-nav {
      display: flex;
      justify-content: center;
      gap: 24px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .f-nav a {
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }

    .f-nav a:hover {
      color: var(--blue);
    }

    .f-copy {
      font-size: 12px;
      color: #94a3b8;
    }

    .f-copy a {
      color: var(--blue);
      text-decoration: none;
    }

    .theme-toggle {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: var(--white);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transition: all 0.3s ease;
      margin-left: auto;
      margin-right: 10px;
      flex-shrink: 0;
    }

    .theme-toggle:hover {
      background: var(--blue-light);
      border-color: var(--blue);
      transform: rotate(20deg) scale(1.1);
    }

    @media (max-width: 768px) {
      .theme-toggle {
        margin-right: 4px;
      }
    }
  </style>
</head>

<body>
  <!-- NAVBAR -->
  <header class="navbar" id="navbar">
    <a href="index.html" class="logo">SHAHKOT</a>
    <button class="menu-btn" id="menuBtn" onclick="toggleMenu()">☰</button>
    <nav id="nav">
      <a href="index.html">Home</a>
      <div class="category">
        <button class="category-btn" onclick="toggleDropdown()">
          Categories ▾
        </button>
        <div class="dropdown" id="dropdown">
          <a href="../index.html?cat=all&scroll=1">🏪 All</a>
          <a href="../index.html?cat=medical&scroll=1">🏥 Medical</a>
          <a href="../index.html?cat=electronics&scroll=1">📱 Electronics</a>
          <a href="../index.html?cat=grocery&scroll=1">🛒 Grocery</a>
          <a href="../index.html?cat=clothing&scroll=1">👗 Clothing</a>
          <a href="../index.html?cat=education&scroll=1">🎓 Education</a>
        </div>
      </div>
      <a href="about.html">About</a>
      <a href="services.html">Services</a>
    </nav>
  </header>

  <!-- BACK BUTTON -->
  <a href="index.html" class="back-btn" title="Back">&#8592;</a>

  <!-- HERO -->
  <section class="hero">
    <img src="../Image's/Ayesha Dental Clinic/hero.jpeg" alt="Shop Image" id="heroImg" class="hero-img" />
    <div class="hero-overlay"></div>
    <div class="hero-bottom">
      <h1 id="typing"></h1>
    </div>
  </section>

  <!-- GALLERY -->
  <div class="gallery-outer reveal">
    <div class="sec-head">
      <h2>Gallery</h2>
    </div>
    <div class="gallery-scroll" id="gallery">
      <div class="gcard"><img src="ahmed.jpg" alt="" /></div>
      <div class="gcard"><img src="ahmed2.jpg" alt="" /></div>
      <div class="gcard"><img src="shahkot.jpg" alt="" /></div>
    </div>
  </div>

  <!-- ABOUT -->
  <div class="body-wrap reveal" id="aboutWrap">
    <div class="sec-head">
      <h2>About</h2>
    </div>
    <div class="about-card">
      <p id="aboutText">Loading...</p>
    </div>
  </div>

  <!-- OWNER -->
  <div class="body-wrap reveal" id="ownerWrap">
    <div class="sec-head">
      <h2>Owner</h2>
    </div>
    <div class="owner-card">
      <div class="owner-img-wrap" id="ownerImgWrap">
        <img src="shahkot.jpg" id="ownerImg" alt="Owner" />
      </div>
      <div class="owner-info">
        <h3 id="ownerName">Badar Zaman</h3>
        <p id="ownerInfo">Owner Details</p>
      </div>
    </div>
  </div>

  <!-- CONTACT -->
  <div class="body-wrap reveal">
    <div class="sec-head">
      <h2>Contact</h2>
    </div>
    <div class="contact-card">
      <div id="openBadge"></div>
      <div class="contact-grid" id="contactGrid"></div>
      <iframe class="map" id="mapFrame"
        src="https://maps.google.com/maps?q=Shahkot&t=&z=13&ie=UTF8&iwloc=&output=embed">
      </iframe>
    </div>
  </div>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="f-logo">SHAHKOT</div>
    <nav class="f-nav">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="services.html">Services</a>
    </nav>
    <p class="f-copy">
      &copy; 2025 <a href="index.html">Shahkot Directory</a> — Designed &
      Developed by Badar Ul Zaman
    </p>
  </footer>

  <!-- LIGHTBOX -->
  <div id="lightbox">
    <span id="closeBtn">&times;</span>
    <span id="prevBtn">&#8592;</span>
    <img id="lightboxImg" alt="" />
    <span id="nextBtn">&#8594;</span>
  </div>

  <script>
    /* ==================== DARK MODE ==================== */
    (function () {
      const saved = localStorage.getItem("sk_theme");
      if (saved === "dark") {
        document.documentElement.setAttribute("data-theme", "dark");
      }
    })();

    function toggleTheme() {
      const html = document.documentElement;
      const icon = document.getElementById("themeIcon");
      const isDark = html.getAttribute("data-theme") === "dark";
      if (isDark) {
        html.removeAttribute("data-theme");
        localStorage.setItem("sk_theme", "light");
        icon.textContent = "🌙";
      } else {
        html.setAttribute("data-theme", "dark");
        localStorage.setItem("sk_theme", "dark");
        icon.textContent = "☀️";
      }
    }

    // page load par icon set karo
    document.addEventListener("DOMContentLoaded", function () {
      const saved = localStorage.getItem("sk_theme");
      const icon = document.getElementById("themeIcon");
      if (icon && saved === "dark") icon.textContent = "☀️";
    });
    /* NAVBAR */
    window.addEventListener("scroll", () => {
      document
        .getElementById("navbar")
        .classList.toggle("scrolled", window.scrollY > 10);
    });

    /* MENU */
    function toggleMenu() {
      const nav = document.getElementById("nav");
      const btn = document.getElementById("menuBtn");
      nav.classList.toggle("active");
      btn.textContent = nav.classList.contains("active") ? "✖" : "☰";
    }

    /* DROPDOWN */
    function toggleDropdown() {
      document.getElementById("dropdown").classList.toggle("show");
    }
    document.addEventListener("click", (e) => {
      const dd = document.getElementById("dropdown");
      const btn = document.querySelector(".category-btn");
      if (btn && !btn.contains(e.target) && !dd.contains(e.target))
        dd.classList.remove("show");
    });

    /* LIGHTBOX */
    const lightbox = document.getElementById("lightbox");
    const lightboxImg = document.getElementById("lightboxImg");
    let galleryImages = [];
    let currentIndex = 0;

    function openLightboxAt(index) {
      currentIndex = index;
      lightboxImg.style.transition = "none";
      lightboxImg.style.transform = "translateX(0)";
      lightboxImg.style.opacity = "1";
      lightboxImg.src = galleryImages[currentIndex];
      lightbox.classList.add("open");
    }
    function changeImage(newIndex, direction = 1) {
      // direction: 1 = next (left se slide), -1 = prev (right se slide)
      lightboxImg.style.transition =
        "transform 0.25s ease, opacity 0.2s ease";
      lightboxImg.style.transform = `translateX(${direction * -40}px)`;
      lightboxImg.style.opacity = "0";
      setTimeout(() => {
        currentIndex = newIndex;
        lightboxImg.src = galleryImages[currentIndex];
        lightboxImg.style.transition = "none";
        lightboxImg.style.transform = `translateX(${direction * 40}px)`;
        requestAnimationFrame(() => {
          lightboxImg.style.transition =
            "transform 0.3s cubic-bezier(0.22,1,0.36,1), opacity 0.2s ease";
          lightboxImg.style.transform = "translateX(0)";
          lightboxImg.style.opacity = "1";
        });
      }, 180);
    }
    document.getElementById("prevBtn").onclick = (e) => {
      e.stopPropagation();
      changeImage(
        (currentIndex - 1 + galleryImages.length) % galleryImages.length,
        -1,
      );
    };
    document.getElementById("nextBtn").onclick = (e) => {
      e.stopPropagation();
      changeImage((currentIndex + 1) % galleryImages.length, 1);
    };
    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowLeft") document.getElementById("prevBtn").click();
      if (e.key === "ArrowRight") document.getElementById("nextBtn").click();
    });
    let touchStartX = 0;
    lightbox.addEventListener("touchstart", (e) => {
      touchStartX = e.changedTouches[0].clientX;
    });
    lightbox.addEventListener("touchend", (e) => {
      const diff = touchStartX - e.changedTouches[0].clientX;
      if (Math.abs(diff) < 50) return;
      if (diff > 0)
        changeImage((currentIndex + 1) % galleryImages.length, 1);
      else
        changeImage(
          (currentIndex - 1 + galleryImages.length) % galleryImages.length,
          -1,
        );
    });

    function closeLightbox() {
      lightbox.classList.add("closing");
      setTimeout(
        () => lightbox.classList.remove("open", "closing", "owner-mode"),
        260,
      );
    }
    document.getElementById("closeBtn").onclick = closeLightbox;
    lightbox.onclick = (e) => {
      if (e.target === lightbox) closeLightbox();
    };
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") closeLightbox();
    });

    /* SCROLL REVEAL */
    const observer = new IntersectionObserver(
      (entries) => {
        entries.forEach((e) => {
          if (e.isIntersecting) e.target.classList.add("visible");
        });
      },
      { threshold: 0.1 },
    );
    document
      .querySelectorAll(".reveal")
      .forEach((el) => observer.observe(el));

    /* OPEN/CLOSED BADGE */
    function showOpenBadge(timing) {
      if (!timing) return;
      const badge = document.getElementById("openBadge");
      const parts = timing.split(" - ");
      if (parts.length !== 2) return;
      const open = convertTo24(parts[0]);
      const close = convertTo24(parts[1]);
      const now = new Date();
      const cur = now.getHours() * 60 + now.getMinutes();
      const isOpen =
        close > open
          ? cur >= open && cur <= close
          : cur >= open || cur <= close;
      let text = "Closed",
        cls = "open-badge closed";
      if (isOpen) {
        const rem = close - cur;
        if (rem <= 30 && rem > 0) {
          text = "Closing Soon";
          cls = "open-badge warning";
        } else {
          text = "Open Now";
          cls = "open-badge";
        }
      }
      badge.innerHTML = `<div class="${cls}"><span>${text}</span><span style="color:#64748b;font-weight:400;">${timing}</span></div>`;
    }
    function convertTo24(t) {
      let [time, mod] = t.split(" ");
      let [h, m] = time.split(":");
      h = parseInt(h);
      if (mod === "PM" && h !== 12) h += 12;
      if (mod === "AM" && h === 12) h = 0;
      return h * 60 + parseInt(m);
    }

    /* DATA LOAD */
    document.addEventListener("DOMContentLoaded", () => {
      const id = new URLSearchParams(window.location.search).get("id");

      fetch("../shops.json")
        .then((r) => r.json())
        .then((data) => {
          const shop = data.find((s) => s.id == id);
          if (!shop) {
            document.body.innerHTML = `<div style="text-align:center;margin-top:120px;font-family:Poppins,sans-serif;"><h2 style="color:#64748b;">No shop found</h2></div>`;
            return;
          }

          document.title = shop.name + " | Shahkot";
          const favicon = document.querySelector("link[rel='icon']");
          if (favicon)
            favicon.href = shop.favicon || shop.cardImage || shop.hero;

          // Hero
          if (shop.hero || shop.cardImage)
            document.getElementById("heroImg").src =
              (shop.hero || shop.cardImage) + "?v=" + Date.now();
          document.getElementById("typing").innerText = shop.name || "";

          // About
          if (shop.about) {
            let html = shop.about
              .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>") //text bold (**content**)
              .replace(/\|\|/g, "</p><p>") // new paragraph (||content||)
              .replace(/\|/g, "<br>"); //new line (|content|)
            document.getElementById("aboutText").innerHTML =
              "<p>" + html + "</p>";
          } else document.getElementById("aboutWrap").style.display = "none";

          // Owner
          if (shop.ownerName || shop.ownerImage) {
            if (shop.ownerName)
              document.getElementById("ownerName").innerText = shop.ownerName;
            if (shop.ownerImage)
              document.getElementById("ownerImg").src =
                shop.ownerImage + "?v=" + Date.now();
            if (shop.ownerInfo)
              document.getElementById("ownerInfo").innerText = shop.ownerInfo;
            else document.getElementById("ownerInfo").style.display = "none";
            document.getElementById("ownerImgWrap").onclick = () => {
              lightboxImg.src = document.getElementById("ownerImg").src;
              lightbox.classList.add("open");
              lightbox.classList.add("owner-mode");
            };
          } else {
            document.getElementById("ownerWrap").style.display = "none";
          }

          // Gallery
          const gallery = document.getElementById("gallery");
          if (shop.gallery && shop.gallery.length > 0) {
            gallery.innerHTML = "";
            shop.gallery.forEach((img) => {
              const div = document.createElement("div");
              div.className = "gcard";
              const image = document.createElement("img");
              image.src = img + "?v=" + Date.now();
              image.alt = "";
              div.appendChild(image);
              const idx = gallery.children.length; // index before append
              galleryImages.push(img + "?v=" + Date.now());
              div.onclick = () => openLightboxAt(idx);
              gallery.appendChild(div);
            });
          } else {
            document.querySelector(".gallery-outer").style.display = "none";
          }

          // Contact
          showOpenBadge(shop.timing);
          const grid = document.getElementById("contactGrid");
          grid.innerHTML = "";

          function addBox(label, value, full) {
            if (!value) return;
            const div = document.createElement("div");
            div.className = "cbox" + (full ? " full" : "");
            let content = value;
            let icon = "";

            if (label.toLowerCase() === "phone") {
              icon = `<a href="tel:${value}" class="cbox-icon call" title="Call Now">📞</a>`;
            }
            if (label.toLowerCase() === "whatsapp") {
              let num = value.replace(/\D/g, "");
              if (num.startsWith("0")) num = "92" + num.substring(1);
              icon = `<a href="https://wa.me/${num}" target="_blank" class="cbox-icon whatsapp" title="Chat Now">💬</a>`;
            }
            if (label.toLowerCase() === "email") {
              const isMobile = /Android|iPhone|iPad|iPod/i.test(
                navigator.userAgent,
              );
              const emailHref = isMobile
                ? `mailto:${value}`
                : `https://mail.google.com/mail/?view=cm&to=${value}`;
              content = `<a href="${emailHref}" target="_blank">${value}</a>`;
            }

            div.innerHTML = `<strong>${label}</strong><div class="cbox-row"><span>${content}</span>${icon}</div>`;
            grid.appendChild(div);
          }

          addBox("Phone", shop.phone);
          addBox("WhatsApp", shop.whatsapp);
          addBox("Email", shop.email);
          addBox("Timing", shop.timing);
          addBox("Address", shop.address, true);

          const map = document.getElementById("mapFrame");
          if (shop.map) map.src = shop.map;
          else map.style.display = "none";
        });
    });
    /* ==================== SERVICE WORKER REGISTER (OFFLINE SUPPORT) ==================== */
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker
          .register("/sw.js")
          .then(() => console.log("Shahkot Directory: offline mode ready ✅"))
          .catch((err) => console.log("Service worker failed:", err));
      });
    }
  </script>
