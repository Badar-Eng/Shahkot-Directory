<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Admin Login</title>

    <style>
        body {

            margin: 0;

            font-family: Arial;

            background: #f5f5f5;

            display: flex;

            justify-content: center;

            align-items: center;

            height: 100vh;

        }

        .login-box {

            background: white;

            padding: 40px;

            border-radius: 15px;

            width: 350px;

            box-shadow: 0 10px 25px rgba(0, 0, 0, .15);

        }

        .login-box h1 {

            text-align: center;

            color: #5B3DF5;

        }

        .login-box h2 {

            text-align: center;

            margin-bottom: 25px;

        }

        input {

            width: 100%;

            padding: 12px;

            margin: 10px 0;

            border-radius: 8px;

            border: 1px solid #ccc;

            box-sizing: border-box;

        }

        button {

            width: 100%;

            padding: 12px;

            background: #5B3DF5;

            color: white;

            border: none;

            border-radius: 8px;

            cursor: pointer;

            font-size: 16px;

        }

        button:hover {

            background: #4525dd;

        }

        #error {

            color: red;

            text-align: center;

            margin-top: 10px;

        }
    </style>

</head>

<body>

    <div class="login-box">

        <h1>Shahkot Directory</h1>

        <h2>Admin Login</h2>

        <input type="text" id="username" placeholder="Username">

        <input type="password" id="password" placeholder="Password">

        <button onclick="login()">

            Login

        </button>

        <p id="error"></p>

    </div>

    <script>
        function login() {

            let username = document.getElementById("username").value;

            let password = document.getElementById("password").value;

            if (username === "badar" && password === "professional") {

                window.location = "dashboard.html";

            } else {

                document.getElementById("error").innerHTML = "Wrong Username or Password";

            }

        }
    </script>

</body>

</html>
